<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- CSP per brief §3: local-only, no eval, no remote content. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">
  <title>Vocality</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">Vocality</div>
      <nav class="tab-bar" role="tablist">
        <button type="button" class="tab" data-view="batch" role="tab">Batch</button>
        <button type="button" class="tab" data-view="registry" role="tab">Registry</button>
        <button type="button" class="tab" data-view="redo" role="tab">Redo</button>
      </nav>
    </header>

    <main class="app-main">
      <section class="view" data-view="batch">
        <div class="batch-toolbar">
          <input type="text" class="scan-path" value="Material" spellcheck="false"
                 aria-label="Scan directory">
          <button type="button" class="btn btn-secondary" data-action="scan">Scan</button>
          <button type="button" class="btn btn-primary" data-action="start" disabled>Start batch</button>
          <button type="button" class="btn btn-danger" data-action="cancel" disabled>Cancel</button>
          <span class="batch-summary"></span>
        </div>

        <div class="batch-files"></div>
        <template id="file-row-template">
          <div class="file-row">
            <div class="file-cell file-name"></div>
            <div class="file-cell file-phase"></div>
            <div class="file-cell file-progress">
              <div class="file-progress-bar"></div>
              <span class="file-progress-label"></span>
            </div>
            <div class="file-cell file-status"></div>
          </div>
        </template>
      </section>
      <section class="view" data-view="registry" hidden>
        <div class="registry-layout">
          <div class="registry-left">
            <div class="registry-toolbar">
              <button type="button" class="btn btn-secondary" data-action="refresh-persons">Refresh</button>
              <span class="registry-summary"></span>
            </div>
            <div class="persons-table" role="listbox">
              <div class="persons-header">
                <span>ID</span>
                <span>Display</span>
                <span>Role</span>
                <span class="sessions-col" title="teacher/student sessions">T/S</span>
              </div>
              <div class="persons-rows"></div>
            </div>
            <div class="collisions-panel" hidden>
              <div class="collisions-header">Collisions</div>
              <div class="collisions-list"></div>
            </div>
          </div>

          <div class="registry-right">
            <div class="inspect-empty">Select a person to inspect.</div>
            <div class="inspect-detail" hidden>
              <div class="inspect-header">
                <span class="inspect-id"></span>
                <span class="inspect-display"></span>
              </div>
              <dl class="inspect-fields"></dl>
              <div class="inspect-voiceprints">
                <div class="vp-header">Voiceprints</div>
                <ul class="vp-list"></ul>
              </div>
              <div class="inspect-actions">
                <button type="button" class="btn btn-secondary" data-action="edit-person">Edit</button>
                <button type="button" class="btn btn-secondary" data-action="rename-person">Rename</button>
                <button type="button" class="btn btn-danger" data-action="merge-person">Merge into…</button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="view" data-view="redo" hidden>
        <form class="redo-filter" autocomplete="off">
          <div class="redo-field">
            <label>Threshold (sessions)</label>
            <input type="number" name="threshold" min="0" value="3">
          </div>
          <div class="redo-field">
            <label>Student id</label>
            <input type="text" name="student" placeholder="(any)">
          </div>
          <div class="redo-field">
            <label>Teacher id</label>
            <input type="text" name="teacher" placeholder="(any)">
          </div>
          <div class="redo-field">
            <label>Confidence &lt;</label>
            <input type="number" name="confidence_below" min="0" max="1" step="0.05" placeholder="(off)">
          </div>
          <div class="redo-field">
            <label>After (YYYY-MM-DD)</label>
            <input type="text" name="after" placeholder="(any date)">
          </div>
          <div class="redo-field redo-field-check">
            <label><input type="checkbox" name="all"> --all (ignore filter)</label>
          </div>
          <div class="redo-actions">
            <button type="button" class="btn btn-secondary" data-action="redo-find">Find (dry run)</button>
            <button type="button" class="btn btn-primary" data-action="redo-run">Run redo</button>
            <button type="button" class="btn btn-danger" data-action="redo-cancel" disabled>Cancel</button>
            <span class="redo-summary"></span>
          </div>
        </form>

        <div class="batch-files redo-files"></div>
      </section>
    </main>

    <footer class="status-bar" aria-live="polite">
      <span class="status-dot" data-status="down"></span>
      <span class="status-label">daemon: down</span>
      <span class="status-spacer"></span>
      <span class="status-version"></span>
      <span class="status-last-error"></span>
    </footer>
  </div>

  <!-- Simple modal used by registry actions + future settings. -->
  <div class="modal" hidden role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title"></span>
        <button type="button" class="modal-close" aria-label="Close">×</button>
      </div>
      <form class="modal-body"></form>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-action="modal-cancel">Cancel</button>
        <button type="button" class="btn btn-primary" data-action="modal-submit">Save</button>
      </div>
    </div>
  </div>

  <script src="app-state.js"></script>
  <script src="app.js"></script>
</body>
</html>
