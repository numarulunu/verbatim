<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- CSP per brief §3: local-only, no eval, no remote content. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">
  <title>Vocality</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">Vocality</div>
      <nav class="tab-bar" role="tablist">
        <button type="button" class="tab" data-view="batch" role="tab">Batch</button>
        <button type="button" class="tab" data-view="registry" role="tab">Registry</button>
        <button type="button" class="tab" data-view="redo" role="tab">Redo</button>
      </nav>
    </header>

    <main class="app-main">
      <section class="view" data-view="batch">
        <div class="batch-toolbar">
          <input type="text" class="scan-path" value="Material" spellcheck="false"
                 aria-label="Scan directory">
          <button type="button" class="btn btn-secondary" data-action="scan">Scan</button>
          <button type="button" class="btn btn-primary" data-action="start" disabled>Start batch</button>
          <button type="button" class="btn btn-danger" data-action="cancel" disabled>Cancel</button>
          <span class="batch-summary"></span>
        </div>

        <div class="batch-files"></div>
        <template id="file-row-template">
          <div class="file-row">
            <div class="file-cell file-name"></div>
            <div class="file-cell file-phase"></div>
            <div class="file-cell file-progress">
              <div class="file-progress-bar"></div>
              <span class="file-progress-label"></span>
            </div>
            <div class="file-cell file-status"></div>
          </div>
        </template>
      </section>
      <section class="view" data-view="registry" hidden>
        <div class="view-placeholder">Registry view — persons, voiceprints, rename, merge.</div>
      </section>
      <section class="view" data-view="redo" hidden>
        <div class="view-placeholder">Redo view — stale-transcript filter, replay subset.</div>
      </section>
    </main>

    <footer class="status-bar" aria-live="polite">
      <span class="status-dot" data-status="down"></span>
      <span class="status-label">daemon: down</span>
      <span class="status-spacer"></span>
      <span class="status-version"></span>
      <span class="status-last-error"></span>
    </footer>
  </div>

  <script src="app-state.js"></script>
  <script src="app.js"></script>
</body>
</html>
