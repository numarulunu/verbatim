<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<title>Transcriptor</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Settings bar -->
<div class="settings-bar">
  <div class="settings-row">
    <div class="setting">
      <label>Input (Materials)</label>
      <div class="folder-picker">
        <span class="folder-path" id="inputPath">No folder selected</span>
        <button id="btnInputFolder">Browse</button>
      </div>
    </div>
    <div class="setting">
      <label>Output (Transcriptions)</label>
      <div class="folder-picker">
        <span class="folder-path" id="outputPath">No folder selected</span>
        <button id="btnOutputFolder">Browse</button>
      </div>
    </div>
  </div>
  <div class="settings-row">
    <div class="setting">
      <label>Whisper Model</label>
      <select id="whisperModel">
        <option value="tiny">Tiny (fastest, least accurate)</option>
        <option value="base">Base (fast, decent)</option>
        <option value="small">Small (balanced)</option>
        <option value="medium" selected>Medium (recommended)</option>
        <option value="large-v3">Large v3 (best, slowest)</option>
      </select>
    </div>
    <div class="setting">
      <label>Language</label>
      <select id="whisperLanguage">
        <option value="" selected>Auto-detect</option>
        <option value="en">English</option>
        <option value="ro">Romanian</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ko">Korean</option>
      </select>
    </div>
    <div class="setting">
      <label>Speakers</label>
      <select id="diarize">
        <option value="off">Off</option>
        <option value="auto">Auto-detect</option>
        <option value="2" selected>2 speakers</option>
        <option value="3">3 speakers</option>
        <option value="4">4 speakers</option>
        <option value="5">5 speakers</option>
      </select>
    </div>
    <button class="btn-refresh" id="btnRefresh" title="Rescan files">&#x21bb; Refresh</button>
  </div>
  <div class="settings-row">
    <div class="file-type-toggles">
      <label class="toggle"><input type="checkbox" id="processAudio" checked> Audio</label>
      <label class="toggle"><input type="checkbox" id="processVideos" checked> Video</label>
      <label class="toggle"><input type="checkbox" id="processPdf" checked> PDF</label>
      <label class="toggle"><input type="checkbox" id="processImages" checked> Images</label>
      <label class="toggle"><input type="checkbox" id="processDocx" checked> DOCX</label>
      <label class="toggle"><input type="checkbox" id="processXlsx" checked> XLSX</label>
      <label class="toggle"><input type="checkbox" id="processPptx" checked> PPTX</label>
      <label class="toggle"><input type="checkbox" id="processTxt" checked> TXT</label>
    </div>
  </div>
</div>

<!-- File queue header -->
<div class="queue-header" id="queueHeader" style="display:none">
  <label class="toggle"><input type="checkbox" id="selectAll" checked> Select All</label>
  <span class="file-count" id="fileCount"></span>
  <button class="btn-delete" id="btnDeleteOriginals" style="display:none">Delete Originals</button>
</div>

<!-- File queue -->
<div class="file-queue" id="fileQueue">
  <div class="empty-state">Select input/output folders and click Refresh</div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <div class="system-info" id="systemInfo">Detecting system...</div>
  <div class="controls">
    <div class="overall-progress" id="overallProgress"></div>
    <button class="btn-start" id="btnStart" disabled>Start</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
