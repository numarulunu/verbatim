# MFA custom pronunciation dictionary — vocal pedagogy terminology.
# Used by mfa_align.py when the optional MFA phase is invoked.
# Format: <word>: [<phoneme_1>, <phoneme_2>, ...]  (IPA-ish, MFA-compatible)
#
# MFA silently drops words not present in its default dictionary. This file
# covers music terms that would otherwise be dropped, causing <95% word
# overlap and triggering rejection of the MFA output.
#
# Seed entries only — extend as gaps are observed.

passaggio:   [p, ah, s, aa, zh, iy, ow]
appoggio:    [ah, p, ow, jh, iy, ow]
legato:      [l, ih, g, aa, t, ow]
staccato:    [s, t, ah, k, aa, t, ow]
marcato:     [m, aa, r, k, aa, t, ow]
falsetto:    [f, ah, l, s, eh, t, ow]
tessitura:   [t, eh, s, ih, t, uh, r, ah]
coloratura:  [k, ah, l, ow, r, ah, t, uh, r, ah]
squillo:     [s, k, w, iy, l, ow]
portamento:  [p, ow, r, t, ah, m, eh, n, t, ow]
chiaroscuro: [k, y, aa, r, ow, s, k, uh, r, ow]
bel:         [b, eh, l]
canto:       [k, aa, n, t, ow]
